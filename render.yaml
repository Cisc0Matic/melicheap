services:
  - type: web
    name: melicheap
    runtime: docker
    repo: https://github.com/Cisc0Matic/melicheap
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: melicheap-db
          property: connectionString
      - key: PORT
        value: 10000
    healthCheckPath: /api/ping

databases:
  - name: melicheap-db
    databaseName: melicheap
    plan: free
